name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "stable or beta"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - stable
      version_override:
        description: "Optional explicit version, e.g. 4.0.0-beta.1 or 4.0.0"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Preview only"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ESCORIA_DEPLOYMENT_TOKEN }}

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install release tooling
        run: |
          npm install --no-save \
            release-it \
            @release-it/conventional-changelog \
            conventional-changelog-conventionalcommits

      - name: Configure Git identity
        run: |
          git config user.name "escoria-gh-actions"
          git config user.email "escoria-gh-actions@users.noreply.github.com"
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Run release-it
        env:
          GITHUB_TOKEN: ${{ secrets.ESCORIA_DEPLOYMENT_TOKEN }}
        run: |
          set -euo pipefail

          CMD=(npx release-it --ci)

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            CMD+=(--dry-run)
          fi

          if [ "${{ inputs.release_type }}" = "beta" ]; then
            CMD+=(--preRelease=beta --github.preRelease)
          fi

          if [ -n "${{ inputs.version_override }}" ]; then
            CMD+=("${{ inputs.version_override }}")
          fi

          printf 'Running:'
          printf ' %q' "${CMD[@]}"
          printf '\n'

          "${CMD[@]}"
